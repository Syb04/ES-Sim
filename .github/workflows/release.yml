# ES-Sim 配布ビルド (Windows インストーラ) — GitHub Actions
#
# トリガー:
#   - `v*` タグの push (例: v0.1.0) → ビルドして GitHub Release に添付
#   - 手動実行 (workflow_dispatch)   → ビルドして Artifacts にのみ保存 (Release は作らない)
#
# 構成: windows-latest 上で
#   Python + PyInstaller でバックエンドを exe 化 (scripts/build_backend.ps1)
#   → Node + Rust で Tauri をビルド (サイドカー同梱)
#   → NSIS/MSI インストーラを Release へアップロード
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # Release 作成に必要

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- バックエンド (PyInstaller) ----
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend deps + PyInstaller
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build backend exe (sidecar)
        shell: pwsh
        run: |
          # 診断プローブ (失敗時に ci-log ブランチへ公開される)
          $ErrorActionPreference = "Continue"
          "== python ==" | Tee-Object -FilePath backend-build.log
          python -VV 2>&1 | Tee-Object -Append backend-build.log
          python -c "import sys; print('prefix:', sys.prefix)" 2>&1 | Tee-Object -Append backend-build.log
          pip show gmsh pyinstaller 2>&1 | Select-String "Name|Version|Location" | Tee-Object -Append backend-build.log
          "== import probe ==" | Tee-Object -Append backend-build.log
          python -c "import gmsh; print('gmsh import ok')" 2>&1 | Tee-Object -Append backend-build.log
          python -c "import es_sim.server; print('es_sim import ok')" 2>&1 | Tee-Object -Append backend-build.log
          "== build_backend.ps1 ==" | Tee-Object -Append backend-build.log
          & powershell -ExecutionPolicy Bypass -File scripts\build_backend.ps1 2>&1 | Tee-Object -Append backend-build.log
          $code = $LASTEXITCODE
          "== exit code: $code ==" | Tee-Object -Append backend-build.log
          if ($code -ne 0) { exit 1 }
      - name: Publish failure log to ci-log branch (公開診断用)
        if: failure()
        shell: pwsh
        run: |
          git config user.name "ci"
          git config user.email "ci@localhost"
          git switch --orphan ci-log
          Copy-Item backend-build.log log.txt -ErrorAction SilentlyContinue
          if (-not (Test-Path log.txt)) { "no log captured" | Set-Content log.txt }
          git add -f log.txt
          git commit -m "ci failure log"
          git push -f origin ci-log
      - name: Smoke test backend exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem frontend\src-tauri\binaries\es-sim-backend-*.exe | Select-Object -First 1
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--port","8317" -PassThru
          try {
            $ok = $false
            foreach ($i in 1..60) {
              Start-Sleep -Seconds 2
              try {
                $r = Invoke-RestMethod -Uri "http://127.0.0.1:8317/health" -TimeoutSec 2
                if ($r.status -eq "ok") { $ok = $true; break }
              } catch {}
            }
            if (-not $ok) { throw "backend /health が応答しません" }
            Write-Host "backend health OK: $($r | ConvertTo-Json -Compress)"
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      # ---- フロントエンド (Tauri) ----
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Tauri build
        working-directory: frontend
        shell: pwsh
        run: |
          $out = & npm run tauri build 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) {
            $tail = if ($out.Length -gt 6000) { $out.Substring($out.Length - 6000) } else { $out }
            "## tauri build failed (exit $LASTEXITCODE)`n``````text`n$tail`n``````" |
              Out-File -Append -Encoding utf8 $env:GITHUB_STEP_SUMMARY
            exit 1
          }

      # ---- 成果物 ----
      - name: Collect installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-out | Out-Null
          Get-ChildItem -Recurse frontend\src-tauri\target\release\bundle -Include *.exe,*.msi |
            Copy-Item -Destination release-out
          Get-ChildItem release-out
      - uses: actions/upload-artifact@v4
        with:
          name: es-sim-windows-installers
          path: release-out/*
      - name: Create GitHub Release (tag push のみ)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/*
          generate_release_notes: true
